<!-- Dynamic Header Section -->

<div class="space-y-1">
<h2 class="text-display-md font-headline font-bold text-on-surface tracking-tight">Mesas - 40 mesas</h2>
<p class="text-label-md text-outline font-medium">Visualización en tiempo real del salón principal</p>
</div>
<div class="flex items-center gap-3">
<button class="ember-gradient text-white flex items-center gap-2 px-6 py-3 rounded-full shadow-lg shadow-primary/20 hover:scale-[1.02] active:scale-95 transition-all">
<span class="material-symbols-outlined text-[20px]" data-icon="qr_code">qr_code</span>
<span class="text-sm font-bold uppercase tracking-wider">Imprimir QR</span>
</button>
</div>
</section>
<!-- Filters -->
<section class="flex items-center gap-2 overflow-x-auto pb-2 scrollbar-hide">
<button class="bg-primary text-on-primary px-6 py-2 rounded-full text-sm font-bold shadow-sm">TODAS</button>
<button class="bg-surface-container-highest text-on-surface-variant px-6 py-2 rounded-full text-sm font-bold hover:bg-surface-variant transition-colors">LIBRES</button>
<button class="bg-surface-container-highest text-on-surface-variant px-6 py-2 rounded-full text-sm font-bold hover:bg-surface-variant transition-colors">OCUPADAS</button>
<button class="bg-surface-container-highest text-on-surface-variant px-6 py-2 rounded-full text-sm font-bold hover:bg-surface-variant transition-colors">RESERVADAS</button>
</section>
<!-- Tables Grid: 5 columns x 8 rows -->
<section class="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-5">
<!-- Template for Tables -->
<!-- Table 01: Free -->
<div class="bg-surface-container-lowest rounded-xl p-5 ambient-shadow border-l-4 border-success-custom flex flex-col justify-between h-40 transition-transform hover:scale-[1.03] cursor-pointer">
<div class="flex justify-between items-start">
<span class="text-3xl font-black font-headline text-on-surface">01</span>
<span class="bg-success-custom/10 text-success-custom px-2 py-1 rounded-md text-[10px] font-bold">LIBRE</span>
</div>
<div class="flex items-end justify-between">
<span class="material-symbols-outlined text-success-custom/40 text-4xl" data-icon="chair">chair</span>
<span class="text-[10px] text-outline font-medium">Cap: 4</span>
</div>
</div>
<!-- Table 02: Occupied -->
<div class="bg-surface-container-lowest rounded-xl p-5 ambient-shadow border-l-4 border-occupied-custom flex flex-col justify-between h-40 transition-transform hover:scale-[1.03] cursor-pointer">
<div class="flex justify-between items-start">
<span class="text-3xl font-black font-headline text-on-surface">02</span>
<div class="flex flex-col items-end gap-1">
<span class="bg-occupied-custom/10 text-occupied-custom px-2 py-1 rounded-md text-[10px] font-bold uppercase">Ocupada</span>
<span class="text-xs font-bold text-occupied-custom">45 min</span>
</div>
</div>
<div class="flex items-end justify-between">
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-occupied-custom" data-icon="person" style="font-variation-settings: 'FILL' 1;">person</span>
<span class="text-[10px] font-bold text-on-surface">Carlos R.</span>
</div>
<span class="text-[10px] text-outline font-medium">3/4 pers.</span>
</div>
</div>
<!-- Table 03: Reserved -->

<div class="flex justify-between items-start">
<span class="text-3xl font-black font-headline text-on-surface">03</span>
<span class="bg-reserved-custom/10 text-reserved-custom px-2 py-1 rounded-md text-[10px] font-bold">RESERVADA</span>
</div>
<div class="flex items-end justify-between">
<div class="flex flex-col">
<span class="text-[10px] font-bold text-on-surface">Fam. Gomez</span>
<span class="text-[10px] text-outline">19:30 PM</span>
</div>
<span class="material-symbols-outlined text-reserved-custom/40" data-icon="event">event</span>
</div>
</div>
<!-- Fill Remaining Tables (Example Logic) -->
<!-- Table 04: Free -->
<div class="bg-surface-container-lowest rounded-xl p-5 ambient-shadow border-l-4 border-success-custom flex flex-col justify-between h-40 transition-transform hover:scale-[1.03] cursor-pointer">
<div class="flex justify-between items-start">
<span class="text-3xl font-black font-headline text-on-surface">04</span>
<span class="bg-success-custom/10 text-success-custom px-2 py-1 rounded-md text-[10px] font-bold">LIBRE</span>
</div>
<div class="flex items-end justify-between">
<span class="material-symbols-outlined text-success-custom/40 text-4xl" data-icon="chair">chair</span>

</div>

<div class="flex flex-col items-end gap-1">
<span class="bg-occupied-custom/10 text-occupied-custom px-2 py-1 rounded-md text-[10px] font-bold">OCUPADA</span>
<span class="text-xs font-bold text-occupied-custom">12 min</span>
</div>
</div>
<div class="flex items-end justify-between">
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-occupied-custom" data-icon="person" style="font-variation-settings: 'FILL' 1;">person</span>
<span class="text-[10px] font-bold text-on-surface">Ana L.</span>
</div>
<span class="text-[10px] text-outline font-medium">2/2 pers.</span>
</div>

<!-- Repeating items for visualization of grid (Truncated for brevity, normally loop to 40) -->
<script>
                    const container = document.querySelector('section.grid');
                    for (let i = 6; i <= 40; i++) {
                        const statusRand = Math.random();
                        let status = 'free';
                        if (statusRand > 0.7) status = 'occupied';
                        else if (statusRand > 0.9) status = 'reserved';

                        const tableDiv = document.createElement('div');
                        const statusClass = status === 'free' ? 'border-success-custom' : status === 'occupied' ? 'border-occupied-custom' : 'border-reserved-custom';
                        const badgeColor = status === 'free' ? 'bg-success-custom/10 text-success-custom' : status === 'occupied' ? 'bg-occupied-custom/10 text-occupied-custom' : 'bg-reserved-custom/10 text-reserved-custom';
                        const badgeText = status.toUpperCase();

                        tableDiv.className = `bg-surface-container-lowest rounded-xl p-5 ambient-shadow border-l-4 ${statusClass} flex flex-col justify-between h-40 transition-transform hover:scale-[1.03] cursor-pointer`;
                        tableDiv.innerHTML = `
                            <div class="flex justify-between items-start">
                                <span class="text-3xl font-black font-headline text-on-surface">${i < 10 ? '0' + i : i}</span>
                                <div class="flex flex-col items-end gap-1">
                                    <span class="${badgeColor} px-2 py-1 rounded-md text-[10px] font-bold">${badgeText}</span>
                                    ${status === 'occupied' ? `<span class="text-xs font-bold text-occupied-custom">${Math.floor(Math.random() * 60)} min</span>` : ''}
                                </div>
                            </div>
                            <div class="flex items-end justify-between">
                                ${status === 'occupied' ? `
                                    <div class="flex items-center gap-2">
                                        <span class="material-symbols-outlined text-occupied-custom" data-icon="person" style="font-variation-settings: 'FILL' 1;">person</span>
                                        <span class="text-[10px] font-bold text-on-surface">Staff</span>
                                    </div>
                                ` : status === 'reserved' ? `
                                    <div class="flex flex-col">
                                        <span class="text-[10px] font-bold text-on-surface">Reservado</span>
                                        <span class="text-[10px] text-outline">21:00 PM</span>
                                    </div>
                                ` : `
                                    <span class="material-symbols-outlined text-success-custom/40 text-4xl" data-icon="chair">chair</span>
                                `}
                                <span class="text-[10px] text-outline font-medium">Cap: 4</span>
                            </div>
                        `;
                        container.appendChild(tableDiv);
                    }
                </script>
</section>
</div>
