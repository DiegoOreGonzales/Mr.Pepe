<!-- Left Panel: Ember Gradient & Brand -->
<section class="ember-gradient w-full md:w-1/2 h-[409px] md:h-full flex flex-col items-center justify-center relative p-12 text-center overflow-hidden">
<!-- Decorative Grain Texture -->
<div class="absolute inset-0 opacity-10 pointer-events-none mix-blend-overlay" data-alt="subtle dark asphalt texture for organic grain effect over vibrant orange and red gradient" style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuDYvwLLAdph5LvEJFQWDIs1xD6P_gBoDSPy_Rsb8hEDfbTZ1P9SPPRzau65eXwSa7BYYMYRgSLF6prvd6chy5UGdyn8D2AR2wpRiI8plT9kGdaes_LKeeM4WeB0ltQ8CUOvwVUdUXf_Lnw2KcXruXF2x0130cJcC7XFkBQ9QW7SLDeEuYFqjpOCHopQHdMMKsV8eVsVyRAkOF0QJNLj42wCBwHgrg4oWl5ovzgKMXxHr-9QPrzYZIalf1lorv-C0f_Wj1jvzVNDrT0b');"></div>
<div class="relative z-10 flex flex-col items-center">
<!-- Brand Identity -->
<div class="mb-6 flex items-center justify-center w-24 h-24 bg-white/10 backdrop-blur-md rounded-2xl border border-white/20">
<span class="material-symbols-outlined text-white text-5xl" data-icon="restaurant" style="font-variation-settings: 'FILL' 1;">restaurant</span>
</div>
<h1 class="text-white text-6xl font-extrabold tracking-tighter mb-4">Mr. Pepe</h1>
<p class="text-white/80 text-xl font-medium max-w-xs leading-tight">Control total de tu restaurante</p>
</div>
<!-- Background Image Integration -->
<div class="absolute bottom-0 left-0 w-full h-1/2 opacity-20 pointer-events-none">
<img alt="close-up of glowing charcoal embers in a traditional restaurant oven with sparks and heat ripples" class="w-full h-full object-cover" data-alt="close-up of glowing charcoal embers in a traditional restaurant oven with sparks and heat ripples" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBk0d9RQ-xDSVp9gwuWIxV7F1f8iRZe9iVp-nTJsCDHUt93hTtL632dcSaqMO0zGkSxasS2NuW5WNQU9JhZB2p-_4EXlHFr8iAPPVB5G4eFSuzQQKxfkT8PyRwE5i8clsVysDvbGQCzFNmNx8FD2POwbjDKysN9yTQerntIuJhuBzeue3KbOs_tGIOikba-vJvCObnUmKGrIdCYNyfD8ZKqegMjwaMvoPAP0jvqfRwmil49GjmCqoCbjjlB2eOtxpbGvHnsCYfBC3Oh"/>
</div>
</section>
<!-- Right Panel: Login Form -->
<section class="w-full md:w-1/2 h-full bg-surface-container-lowest flex flex-col items-center justify-center p-8 md:p-24 relative">
<div class="w-full max-w-md">
<header class="mb-10">
<h2 class="text-[28px] font-extrabold text-on-surface tracking-tight mb-2">Bienvenido 👋</h2>
<p class="text-secondary font-medium">Ingresa al panel administrativo</p>
</header>
<form class="space-y-6">
<!-- Email Field -->
<div class="space-y-2">
<label class="block text-[13px] font-semibold text-on-surface-variant uppercase tracking-wider" for="email">Email</label>
<div class="relative group">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline/50 group-focus-within:text-primary-container transition-colors" data-icon="mail">mail</span>
<input class="w-full pl-10 pr-4 py-3 bg-surface-container-low border border-[#E4E7EC] rounded-[10px] text-[13px] font-body text-on-surface focus:ring-0 focus:border-primary-container transition-all outline-none" id="email" name="email" placeholder="usuario@mrpepe.com" type="email"/>
</div>
</div>
<!-- Password Field -->
<div class="space-y-2">
<div class="flex justify-between items-center">
<label class="block text-[13px] font-semibold text-on-surface-variant uppercase tracking-wider" for="password">Password</label>
<a class="text-[12px] font-bold text-primary-container hover:underline" href="#">Olvide mi contraseña</a>
</div>
<div class="relative group">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline/50 group-focus-within:text-primary-container transition-colors" data-icon="lock">lock</span>
<input class="w-full pl-10 pr-12 py-3 bg-surface-container-low border border-[#E4E7EC] rounded-[10px] text-[13px] font-body text-on-surface focus:ring-0 focus:border-primary-container transition-all outline-none" id="password" name="password" placeholder="••••••••" type="password"/>
<button class="absolute right-3 top-1/2 -translate-y-1/2 text-outline/50 hover:text-on-surface" type="button">
<span class="material-symbols-outlined text-[20px]" data-icon="visibility">visibility</span>
</button>
</div>
</div>
<!-- Remember Me Toggle -->
<div class="flex items-center space-x-3 py-2">
<input class="w-4 h-4 rounded border-outline/30 text-primary-container focus:ring-primary-container/20 cursor-pointer" id="remember" type="checkbox"/>
<label class="text-sm font-medium text-secondary cursor-pointer" for="remember">Mantener sesión iniciada</label>
</div>
<!-- Submit Button -->
<button class="w-full bg-primary-container text-white font-bold py-4 rounded-[10px] shadow-lg shadow-primary-container/20 hover:bg-[#8C2510] active:scale-[0.98] transition-all duration-200" type="submit">
                        Iniciar Sesión
                    </button>
</form>
<!-- Support link -->
<div class="mt-8 text-center">
<p class="text-sm text-secondary">¿Problemas para acceder? <a class="text-primary-container font-bold hover:underline" href="#">Contacta a soporte</a></p>
</div>
</div>
<!-- Footer Section -->
<footer class="absolute bottom-8 w-full px-8 flex justify-center items-center">
<div class="flex items-center space-x-2 text-[#9AA0A6] text-[12px] font-medium tracking-tight">
<span>Mr. Pepe © 2026</span>
<span class="w-1 h-1 rounded-full bg-outline/30"></span>
<span>Todos los derechos reservados</span>
</div>
</footer>
